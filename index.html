<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Task List</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Task List">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiVGFzayBMaXN0Iiwic2hvcnRfbmFtZSI6IlRhc2sgTGlzdCIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiNmZmZmZmYiLCJ0aGVtZV9jb2xvciI6IiM0ZjZiZmYiLCJzdGFydF91cmwiOiIuIiwib3JpZW50YXRpb24iOiJwb3J0cmFpdCJ9">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f4f4f6;
    --text: #1c1c1e;
    --text2: #6b6b70;
    --text3: #a0a0a5;
    --border: #e3e3e6;
    --accent: #4f6bff;
    --red: #ff3b30;
    --tile-neutral: #1c1c1e;    --tile-neutral-on: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --bg2: #1c1c1e;
      --text: #f5f5f7;
      --text2: #98989d;
      --text3: #6b6b70;
      --border: #2c2c2e;
      --accent: #7b8fff;
      --red: #ff453a;
      --tile-neutral: #5a5a5e;    --tile-neutral-on: #f5f5f7;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #app {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    overflow: hidden;
  }
  /* iOS has no orientation-lock API for home-screen web apps; this rotates
     the page to counteract a physical landscape flip so it always reads as
     portrait. Only engages when window.orientation exists (iOS/mobile). */
  html.force-portrait {
    position: fixed; top: 0; left: 0; overflow: hidden;
    transform-origin: top left;
  }
  html.force-portrait #app { height: 100% !important; }

  /* Content */
  .content {
    flex: 1 1 auto; overflow-y: auto;
    padding: calc(8px + env(safe-area-inset-top)) 16px 8px;
    -webkit-overflow-scrolling: touch;
  }
  .content-inner {
    min-height: 100%;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .project-header {
    font-size: 20px; font-weight: 600; color: var(--text);
    padding: 16px 4px 4px; letter-spacing: -0.2px;
  }
  .project-header:first-child { padding-top: 4px; }
  .status-label {
    font-size: 12px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--label-color, var(--text2)); padding: 12px 4px 6px;
  }

  /* Task card */
  .card-row { position: relative; overflow: hidden; border-radius: 0; margin-bottom: 6px; }
  .card {
    background: var(--bg2); border-radius: 0; padding: 14px 16px 14px 22px;
    font-size: 15px; font-weight: 400; color: var(--text); line-height: 1.35;
    cursor: pointer; position: relative; z-index: 1;
    transition: transform 0.2s;
  }
  .card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--card-status, transparent);
  }
  /* Arrow-key list selection — inset so .card-row's overflow:hidden (needed
     for the swipe-to-delete clip) doesn't cut the ring off. */
  .card.kb-selected, .triage-card.kb-selected {
    box-shadow: 0 0 0 2px var(--accent) inset;
  }
  .card-delete-bg {
    position: absolute; inset: 0; background: transparent; color: transparent;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 20px; font-size: 14px; font-weight: 500;
    transition: background 0.1s, color 0.1s;
  }
  .card-row.swiping-left .card-delete-bg { background: var(--red); color: #fff; }
  .card-row .delete-hover {
    display: none; position: absolute; top: 50%; right: 14px; transform: translateY(-50%);
    background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; z-index: 2;
  }
  @media (hover: hover) {
    .card-row:hover .delete-hover { display: block; }
  }

  /* Triage card */
  .triage-card {
    background: var(--bg2); border-radius: 0; padding: 14px 16px;
    cursor: pointer; position: relative; z-index: 1;
    transition: transform 0.2s;
  }
  .triage-title { font-size: 15px; font-weight: 400; color: var(--text); line-height: 1.35; }
  .empty-state {
    color: var(--text3); font-size: 15px; padding: 60px 20px; text-align: center;
  }

  /* Project filter row */
  .project-row {
    flex: 0 0 auto;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px;
    padding: 8px 16px 0;
  }

  /* Status + Triage grid */
  .status-grid {
    flex: 0 0 auto;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px;
    padding: 20px 16px;
  }
  .status-tile {
    position: relative; height: 64px; min-width: 0;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 4px;
    font-size: 13px; font-weight: 500; line-height: 1.15;
    border: 1px solid var(--border);
    color: var(--tile-color, var(--text2));
    background: var(--bg);
    cursor: pointer;
  }
  .status-tile.selected {
    background: var(--tile-color, var(--accent));
    border-color: var(--tile-color, var(--accent));
    color: var(--tile-on, #fff);
  }

  /* Bottom row (settings, List/Triage tabs, quick add) — same 4-column grid as .status-grid */
  .bottom-icons {
    flex: 0 0 auto;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px;
    padding: 0 16px calc(16px + env(safe-area-inset-bottom));
  }
  .icon-btn {
    height: 52px; border-radius: 0; padding: 0;
    border: none; background: #ffffff; color: #1c1c1e;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer;
  }
  .nav-tab {
    position: relative; height: 52px; min-width: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 0 8px; text-align: center;
    border: 1px solid #e3e3e6; border-radius: 0; background: #ffffff; color: #6b6b70;
    font-size: 13px; font-weight: 600; letter-spacing: 0.01em;
    cursor: pointer;
  }
  .nav-tab.active { border: 2px solid #8e8e93; color: #1c1c1e; }
  .nav-tab:disabled { cursor: default; opacity: 0.4; }
  .tab-badge {
    position: absolute; top: 4px; right: 6px;
    color: #8e8e93;
    font-size: 11px; font-weight: 600; line-height: 1;
  }

  /* Backdrop + sheets */
  .backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 20;
  }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: calc(223px + env(safe-area-inset-bottom)); z-index: 21;
    background: var(--bg); border-radius: 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    padding: 16px 16px 20px;
  }
  .sheet-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
  }
  .sheet-header button {
    border: none; background: none; font-size: 16px; cursor: pointer; padding: 6px;
  }
  #editClose, #pickerClose, #quickAddClose, #settingsClose, #confirmClose,
  #settingsHomeClose, #editProjectsBack, #editStatusesBack { color: var(--text2); }
  .sheet-title { font-size: 15px; font-weight: 600; }
  .sheet-header-spacer { width: 28px; display: inline-block; }
  .sheet input[type="text"] {
    width: 100%; border: none; padding: 16px 4px; font-size: 17px;
    background: transparent; color: var(--text); outline: none;
  }
  #editTitle { font-size: 17px; font-weight: 500; padding: 8px 4px 16px; }
  .edit-selector-row { display: flex; gap: 3px; margin-top: 4px; }
  .edit-select {
    flex: 1; min-width: 0; padding: 20px 10px; font-size: 15px; font-weight: 500;
    text-align: center; cursor: pointer;
    text-overflow: ellipsis; white-space: nowrap; overflow: hidden;
    border: 1px solid var(--sel-color, var(--border));
    background: var(--sel-color, var(--bg)); color: var(--sel-on, var(--text));
  }
  .edit-select.placeholder { color: var(--text2); }
  .edit-select:focus { outline: 2px solid var(--accent); outline-offset: -2px; }

  /* Picker overlay (project/status selection) */
  .picker-sheet { max-height: 400px; display: flex; flex-direction: column; }
  .picker-title { font-weight: 600; font-size: 15px; }
  .picker-list { overflow-y: auto; margin: 0 -16px; padding: 0 16px; }
  .picker-row {
    padding: 16px 8px; font-size: 15px; color: var(--text); background: var(--bg);
    border-bottom: 0.5px solid var(--border); cursor: pointer;
  }
  .picker-row:last-child { border-bottom: none; }
  .picker-row.selected { color: var(--accent); font-weight: 600; }
  .picker-row.kb-highlight { background: var(--bg2); }
  .settings-sheet label {
    display: block; font-size: 13px; color: var(--text2); margin: 10px 0 4px;
  }
  .settings-sheet input[type="text"], .settings-sheet input[type="password"] {
    width: 100%; border: 1px solid var(--border); border-radius: 0;
    padding: 10px; font-size: 14px; background: var(--bg2); color: var(--text);
  }
  .settings-actions { display: flex; gap: 8px; margin-top: 16px; }
  .settings-actions button {
    flex: 1; padding: 10px; border-radius: 0; border: none; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  #settingsSave { background: var(--accent); color: #fff; }
  #settingsSkip { background: var(--bg2); color: var(--text2); }
  .sync-note { font-size: 12px; color: var(--text3); margin-top: 10px; }
  .confirm-text { font-size: 17px; font-weight: 500; padding: 8px 4px 16px; }
  #confirmDelete { background: var(--red); color: #fff; border: 1px solid var(--red); }
  #confirmKeep { background: var(--bg); color: var(--text2); border: 1px solid var(--border); }

  /* Settings home */
  .settings-row {
    height: 52px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 4px; font-size: 16px; font-weight: 500; color: var(--text);
    border-bottom: 0.5px solid var(--border); cursor: pointer;
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row .chevron { color: var(--text3); font-size: 16px; }

  /* Edit Projects sub-sheet */
  .proj-list { overflow-y: auto; max-height: 300px; margin: 0 -16px; padding: 0 16px; }
  .proj-edit-row {
    display: flex; align-items: center; gap: 6px; padding: 10px 0;
    background: var(--bg); position: relative; z-index: 1;
    transition: transform 0.2s;
  }
  .proj-name-input {
    flex: 1; min-width: 0; border: none; background: transparent; color: var(--text);
    font-size: 15px; padding: 6px 4px; outline: none;
  }

  /* Edit Statuses sub-sheet */
  .status-list { overflow-y: auto; max-height: 300px; margin: 0 -16px; padding: 0 16px; }
  .status-edit-row {
    display: flex; align-items: center; gap: 10px; padding: 12px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .status-edit-row:last-child { border-bottom: none; }
  .status-name-input {
    flex: 1; min-width: 0; border: none; background: transparent; color: var(--text);
    font-size: 15px; padding: 6px 4px; outline: none;
  }
  .status-swatch-btn {
    width: 24px; height: 24px; border-radius: 50%; border: none; padding: 0; cursor: pointer; flex: 0 0 auto;
    background: var(--sw-color, var(--text3));
  }
  .swatch-accordion {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;
    padding: 12px 4px 16px;
  }
  .swatch-option {
    width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; padding: 0; cursor: pointer;
    background: var(--sw-color);
  }
  .swatch-option.selected { border-color: var(--text); }

  [hidden] { display: none !important; }

  @media print {
    .project-row, .status-grid, .bottom-icons, .backdrop, .sheet { display: none !important; }
    html, body, #app { height: auto !important; overflow: visible !important; position: static !important; }
    .content { overflow: visible !important; padding: 0 !important; }
    body, .content, .card, .project-header, .status-label { background: #fff !important; color: #000 !important; }
    .card::before { background: #000 !important; }
    .card { border: 1px solid #ccc; box-shadow: none; }
  }
</style>
</head>
<body>
<div id="app">
  <main class="content" id="content"><div class="content-inner" id="contentInner"></div></main>
  <div class="project-row" id="projectRow">
    <button class="nav-tab" id="allProjectsBtn">All Projects</button>
    <button class="nav-tab" id="projectFilterBtn">Project</button>
  </div>
  <div class="status-grid" id="statusGrid"></div>
  <div class="bottom-icons">
    <button class="icon-btn" id="settingsBtn" aria-label="Settings" title="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82A1.65 1.65 0 0 0 3 13.09H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <button class="nav-tab active" data-tab="main" id="tabMain">List</button>
    <button class="nav-tab" data-tab="triage" id="tabTriage">Triage<span class="tab-badge" id="triageBadge" hidden>0</span></button>
    <button class="icon-btn primary" id="fabBtn" aria-label="Add task">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>

<div class="backdrop" id="backdrop" hidden></div>

<div class="sheet" id="quickAddSheet" hidden style="max-height: 200px;">
  <div class="sheet-header">
    <span></span>
    <button id="quickAddClose">&#10005;</button>
  </div>
  <input type="text" id="quickAddInput" placeholder="Type a task…">
  <div class="edit-selector-row">
    <button class="edit-select" id="quickAddSubmit">Add</button>
  </div>
</div>

<div class="sheet" id="editSheet" hidden style="max-height: 400px;">
  <div class="sheet-header">
    <span></span>
    <button id="editClose">&#10005;</button>
  </div>
  <input type="text" id="editTitle">
  <div class="edit-selector-row">
    <div class="edit-select" id="editProject" tabindex="0" role="button"></div>
    <div class="edit-select" id="editStatus" tabindex="0" role="button"></div>
  </div>
</div>

<div class="sheet picker-sheet" id="pickerSheet" hidden>
  <div class="sheet-header"><span class="picker-title" id="pickerTitle"></span><button id="pickerClose">&#10005;</button></div>
  <div class="picker-list" id="pickerList"></div>
</div>

<div class="sheet" id="confirmSheet" hidden style="max-height: 220px;">
  <div class="sheet-header">
    <span></span>
    <button id="confirmClose">&#10005;</button>
  </div>
  <div class="confirm-text" id="confirmText">Delete Task?</div>
  <div class="edit-selector-row">
    <button class="edit-select" id="confirmDelete">Delete</button>
    <button class="edit-select" id="confirmKeep">Keep</button>
  </div>
</div>

<div class="sheet" id="settingsHomeSheet" hidden style="max-height: 280px;">
  <div class="sheet-header">
    <span class="sheet-header-spacer"></span>
    <span class="sheet-title">Settings</span>
    <button id="settingsHomeClose">&#10005;</button>
  </div>
  <div class="settings-row" data-target="print">Print</div>
  <div class="settings-row" data-target="editProjects">Edit Projects<span class="chevron">&#8250;</span></div>
  <div class="settings-row" data-target="editStatuses">Edit Statuses<span class="chevron">&#8250;</span></div>
  <div class="settings-row" data-target="syncSetup">Sync Setup<span class="chevron">&#8250;</span></div>
</div>

<div class="sheet" id="editProjectsSheet" hidden style="max-height: 460px;">
  <div class="sheet-header">
    <button id="editProjectsBack">&#8249;</button>
    <span class="sheet-title">Edit Projects</span>
    <span class="sheet-header-spacer"></span>
  </div>
  <input type="text" id="addProjectInput" placeholder="New project…">
  <div class="edit-selector-row">
    <button class="edit-select" id="addProjectBtn">Add</button>
  </div>
  <div class="proj-list" id="projList"></div>
</div>

<div class="sheet" id="editStatusesSheet" hidden style="max-height: 460px;">
  <div class="sheet-header">
    <button id="editStatusesBack">&#8249;</button>
    <span class="sheet-title">Edit Statuses</span>
    <span class="sheet-header-spacer"></span>
  </div>
  <div class="status-list" id="statusList"></div>
</div>

<div class="sheet settings-sheet" id="settingsSheet" hidden>
  <div class="sheet-header">
    <button id="settingsClose">&#8249;</button>
    <span class="sheet-title">Sync Setup</span>
    <span class="sheet-header-spacer"></span>
  </div>
  <label>GitHub owner</label>
  <input type="text" id="ghOwner" placeholder="e.g. RonSill">
  <label>Repo name</label>
  <input type="text" id="ghRepo" placeholder="e.g. Task-List">
  <label>Personal access token</label>
  <input type="password" id="ghPat" placeholder="github_pat_...">
  <div class="settings-actions">
    <button id="settingsSkip">Use local only</button>
    <button id="settingsSave">Save &amp; Sync</button>
  </div>
  <div class="sync-note" id="syncNote"></div>
</div>

<script>
(function () {
  "use strict";

  // ---------- Data model ----------
  var STATUS_KEYS = ["priority", "active", "waiting", "scheduled", "optimize", "getdo", "someday"];

  // 12-color curated palette (Tuxx spec 2026-07-11). The first 7 entries are
  // the original per-status defaults, in STATUS_KEYS order, so nothing shifts
  // visually unless a status is actively recolored via Edit Statuses.
  var PALETTE = [
    { name: "Magenta",    light: "#d6006e", dark: "#ff5cad", onLight: "#ffffff", onDark: "#1c1c1e" },
    { name: "Lime",       light: "#84cc16", dark: "#a6e22e", onLight: "#1c1c1e", onDark: "#1c1c1e" },
    { name: "Gray",       light: "#6b6b70", dark: "#98989d", onLight: "#ffffff", onDark: "#1c1c1e" },
    { name: "Gold",       light: "#b8860b", dark: "#e0b400", onLight: "#ffffff", onDark: "#1c1c1e" },
    { name: "Purple",     light: "#7c3aed", dark: "#c4a6f5", onLight: "#ffffff", onDark: "#1c1c1e" },
    { name: "Teal",       light: "#0d9488", dark: "#2dd4bf", onLight: "#ffffff", onDark: "#1c1c1e" },
    { name: "Sky Blue",   light: "#3b82c4", dark: "#7dc4f0", onLight: "#ffffff", onDark: "#1c1c1e" },
    { name: "Coral",      light: "#e2622c", dark: "#ff9457", onLight: "#ffffff", onDark: "#1c1c1e" },
    { name: "Forest",     light: "#16794f", dark: "#4ade9e", onLight: "#ffffff", onDark: "#1c1c1e" },
    { name: "Steel Blue", light: "#3d5a80", dark: "#8fb3d9", onLight: "#ffffff", onDark: "#1c1c1e" },
    { name: "Rose",       light: "#c2478d", dark: "#ff8fc4", onLight: "#ffffff", onDark: "#1c1c1e" },
    { name: "Slate",      light: "#4b5563", dark: "#94a3b8", onLight: "#ffffff", onDark: "#1c1c1e" }
  ];

  var DEFAULT_STATUS_META = {
    priority:  { label: "Priority",      paletteIndex: 0 },
    active:    { label: "Active",        paletteIndex: 1 },
    waiting:   { label: "Waiting",       paletteIndex: 2 },
    scheduled: { label: "Scheduled",     paletteIndex: 3 },
    optimize:  { label: "Optimize",      paletteIndex: 4 },
    getdo:     { label: "Get-Do",        paletteIndex: 5 },
    someday:   { label: "Someday/Maybe", paletteIndex: 6 }
  };

  // Seed project list — editable in-app from here on via Settings > Edit Projects.
  var DEFAULT_PROJECTS = [
    "000 Knowledge",
    "100 Executive", "200 People", "300 Technology", "400 Finance",
    "500 BDO Strategy", "600 Operations", "700 Admin and Travel",
    "800 LA Practice",
    "904 Ron", "905 Kelly", "906 The Gray Samaritan", "907 Cornerstone",
    "908 Travel Personal", "910 Housing", "911 Computing", "912 Family",
    "913 Friends", "914 Health & Fitness", "916 Medical", "918 Veterans",
    "919 KellyVend", "920 Personal Finances", "921 Personal Legal",
    "922 Art Projects", "926 Real Estate", "928 Automobiles",
    "930 Personal Devt", "932 Knowledge", "940 AI"
  ];

  var DATA_KEY = "taskListData";
  var FILTER_KEY = "taskListFilter";
  var PROJECT_FILTER_KEY = "taskListProjectFilter";
  var GH_CONFIG_KEY = "taskListGithubConfig";
  var DATA_PATH = "tasks.json";

  // One-time seed for first-ever run on a device with no saved data yet.
  // Carried over from Ron's prior task app; safe to delete once loaded.
  var SEED_TASKS = [];

  var state = {
    tasks: [],
    projects: [],
    statusMeta: {},
    filter: STATUS_KEYS.slice(),
    projectFilter: null, // null = All Projects; otherwise a single project name
    activeTab: "main",
    editingTaskId: null,
    gh: null // { owner, repo, pat, sha }
  };

  // ---------- Arrow-key list selection (Main + Triage) ----------
  var listSelectedId = null;

  function getVisibleTaskCards() {
    return Array.prototype.slice.call(el.content.querySelectorAll("[data-task-id]"));
  }
  function setListSelection(id) {
    var prev = el.content.querySelector(".kb-selected");
    if (prev) prev.classList.remove("kb-selected");
    listSelectedId = id;
    if (id == null) return;
    var card = el.content.querySelector('[data-task-id="' + id + '"]');
    if (card) {
      card.classList.add("kb-selected");
      card.scrollIntoView({ block: "nearest" });
    }
  }
  // No wrap-around: down stops on the last card, up stops on the first.
  function moveListSelection(delta) {
    var cards = getVisibleTaskCards();
    if (cards.length === 0) return;
    var ids = cards.map(function (c) { return c.dataset.taskId; });
    var idx = listSelectedId ? ids.indexOf(listSelectedId) : -1;
    var newIdx = idx === -1 ? 0 : Math.max(0, Math.min(ids.length - 1, idx + delta));
    setListSelection(ids[newIdx]);
  }
  // Re-applies the highlight after every render (filter/tab/edit changes all
  // re-render); clears the selection once its task is no longer in view,
  // e.g. it moved to the other tab or a status filter tile hid it.
  function reapplyListSelection() {
    if (!listSelectedId) return;
    var card = el.content.querySelector('[data-task-id="' + listSelectedId + '"]');
    if (card) { card.classList.add("kb-selected"); } else { listSelectedId = null; }
  }
  function openSelectedFromList() {
    if (!listSelectedId) return;
    openEditSheet(listSelectedId);
    if (state.activeTab === "triage") {
      el.editProject.focus();
    } else {
      el.editTitle.focus();
    }
  }

  function uid() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return "t-" + Date.now() + "-" + Math.random().toString(16).slice(2);
  }

  function defaultProjectsState() {
    return DEFAULT_PROJECTS.map(function (name) { return { name: name }; });
  }
  function defaultStatusMetaState() {
    var m = {};
    STATUS_KEYS.forEach(function (k) {
      m[k] = { label: DEFAULT_STATUS_META[k].label, paletteIndex: DEFAULT_STATUS_META[k].paletteIndex };
    });
    return m;
  }

  // ---------- Color helpers ----------
  function isDarkMode() {
    return !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
  }
  function statusColor(key) {
    var meta = state.statusMeta[key];
    var sw = PALETTE[meta.paletteIndex];
    return isDarkMode() ? { bg: sw.dark, on: sw.onDark } : { bg: sw.light, on: sw.onLight };
  }
  function statusLabel(key) {
    return state.statusMeta[key].label;
  }
  function statusLabelsMap() {
    var m = {};
    STATUS_KEYS.forEach(function (k) { m[k] = state.statusMeta[k].label; });
    return m;
  }

  // ---------- Project helpers ----------
  function projectNamesSorted() {
    return state.projects.map(function (p) { return p.name; }).sort(function (a, b) {
      return a.toLowerCase().localeCompare(b.toLowerCase());
    });
  }

  // ---------- Persistence (local) ----------
  function loadLocal() {
    try {
      var raw = localStorage.getItem(DATA_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        state.tasks = parsed.tasks || [];
        state.projects = parsed.projects || defaultProjectsState();
        state.statusMeta = parsed.statusMeta || defaultStatusMetaState();
      } else {
        state.tasks = SEED_TASKS;
        state.projects = defaultProjectsState();
        state.statusMeta = defaultStatusMetaState();
        saveLocal();
      }
    } catch (e) {
      state.tasks = [];
      state.projects = defaultProjectsState();
      state.statusMeta = defaultStatusMetaState();
    }
    purgeCompleteTasks();
    try {
      var f = localStorage.getItem(FILTER_KEY);
      if (f) state.filter = JSON.parse(f);
    } catch (e) {}
    try {
      var pf = localStorage.getItem(PROJECT_FILTER_KEY);
      if (pf) state.projectFilter = JSON.parse(pf);
    } catch (e) {}
    try {
      var gh = localStorage.getItem(GH_CONFIG_KEY);
      state.gh = gh ? JSON.parse(gh) : null;
    } catch (e) { state.gh = null; }
  }

  function saveLocal() {
    localStorage.setItem(DATA_KEY, JSON.stringify({ tasks: state.tasks, projects: state.projects, statusMeta: state.statusMeta }));
  }

  function saveFilter() {
    localStorage.setItem(FILTER_KEY, JSON.stringify(state.filter));
  }

  function saveProjectFilter() {
    localStorage.setItem(PROJECT_FILTER_KEY, JSON.stringify(state.projectFilter));
  }

  // ---------- GitHub sync ----------
  // Auto-sync: pulls on load, pushes (debounced) after every change.
  // Falls back to local-only silently if not configured or on network error.
  var pushTimer = null;

  function ghApiUrl() {
    return "https://api.github.com/repos/" + state.gh.owner + "/" + state.gh.repo + "/contents/" + DATA_PATH;
  }

  function b64encode(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }
  function b64decode(str) {
    return decodeURIComponent(escape(atob(str)));
  }

  function ghPull() {
    if (!state.gh) return;
    fetch(ghApiUrl(), {
      headers: { Authorization: "token " + state.gh.pat }
    }).then(function (res) {
      if (!res.ok) throw new Error("pull failed");
      return res.json();
    }).then(function (json) {
      state.gh.sha = json.sha;
      var remote = JSON.parse(b64decode(json.content));
      state.tasks = remote.tasks || [];
      state.projects = remote.projects || defaultProjectsState();
      state.statusMeta = remote.statusMeta || defaultStatusMetaState();
      saveLocal();
      purgeCompleteTasks();
      render();
    }).catch(function () {
      // Network or auth error — silently continue on local data.
    });
  }

  function ghPushNow() {
    if (!state.gh) return;
    var body = {
      message: "Task List sync " + new Date().toISOString(),
      content: b64encode(JSON.stringify({ tasks: state.tasks, projects: state.projects, statusMeta: state.statusMeta })),
      sha: state.gh.sha || undefined
    };
    fetch(ghApiUrl(), {
      method: "PUT",
      headers: { Authorization: "token " + state.gh.pat, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    }).then(function (res) {
      if (!res.ok) throw new Error("push failed");
      return res.json();
    }).then(function (json) {
      state.gh.sha = json.content.sha;
      localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(state.gh));
    }).catch(function () {
      // Last-write-wins, no warning — a failed push just means local stays
      // ahead until the next successful sync attempt.
    });
  }

  function ghPushDebounced() {
    if (!state.gh) return;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(ghPushNow, 500);
  }

  // ---------- Complete-removal migration ----------
  // The Complete status was removed 2026-07-11 in favor of direct delete.
  // Any task still carrying status "complete" from before this upgrade is
  // purged on load, fast-forwarding the 60-day timer that would have
  // deleted it anyway.
  function purgeCompleteTasks() {
    var before = state.tasks.length;
    state.tasks = state.tasks.filter(function (t) { return t.status !== "complete"; });
    if (state.tasks.length !== before) saveLocal();
  }

  // ---------- Mutations ----------
  function persistAndSync() {
    saveLocal();
    ghPushDebounced();
  }

  function addTask(title) {
    state.tasks.push({ id: uid(), title: title, project: null, status: null });
    persistAndSync();
  }

  function updateTask(id, patch) {
    var t = state.tasks.find(function (x) { return x.id === id; });
    if (!t) return;
    Object.assign(t, patch);
    persistAndSync();
  }

  function deleteTask(id) {
    state.tasks = state.tasks.filter(function (x) { return x.id !== id; });
    persistAndSync();
  }

  // ---------- Project mutations ----------
  function renameProject(index, newName) {
    var p = state.projects[index];
    if (!newName || newName === p.name) { renderEditProjectsList(); return; }
    var oldName = p.name;
    p.name = newName;
    state.tasks.forEach(function (t) { if (t.project === oldName) t.project = newName; });
    if (state.projectFilter === oldName) { state.projectFilter = newName; saveProjectFilter(); }
    persistAndSync();
    render();
    renderEditProjectsList();
  }

  function deleteProject(name) {
    state.projects = state.projects.filter(function (p) { return p.name !== name; });
    state.tasks = state.tasks.filter(function (t) { return t.project !== name; });
    if (state.projectFilter === name) { state.projectFilter = null; saveProjectFilter(); }
    persistAndSync();
    render();
    renderEditProjectsList();
  }

  function addProjectFromInput() {
    var input = document.getElementById("addProjectInput");
    var name = input.value.trim();
    if (!name) return;
    state.projects.push({ name: name });
    input.value = "";
    persistAndSync();
    renderEditProjectsList();
  }

  // ---------- Status mutations ----------
  function renameStatus(key, label) {
    if (!label) { renderEditStatusesList(); return; }
    state.statusMeta[key].label = label;
    persistAndSync();
    render();
    renderEditStatusesList();
  }

  function recolorStatus(key, paletteIndex) {
    state.statusMeta[key].paletteIndex = paletteIndex;
    persistAndSync();
    render();
    renderEditStatusesList();
  }

  // ---------- Rendering ----------
  var el = {
    statusGrid: document.getElementById("statusGrid"),
    content: document.getElementById("contentInner"),
    backdrop: document.getElementById("backdrop"),
    quickAddSheet: document.getElementById("quickAddSheet"),
    quickAddInput: document.getElementById("quickAddInput"),
    editSheet: document.getElementById("editSheet"),
    editTitle: document.getElementById("editTitle"),
    editProject: document.getElementById("editProject"),
    editStatus: document.getElementById("editStatus"),
    settingsSheet: document.getElementById("settingsSheet"),
    settingsHomeSheet: document.getElementById("settingsHomeSheet"),
    editProjectsSheet: document.getElementById("editProjectsSheet"),
    editStatusesSheet: document.getElementById("editStatusesSheet"),
    pickerSheet: document.getElementById("pickerSheet"),
    pickerTitle: document.getElementById("pickerTitle"),
    pickerList: document.getElementById("pickerList"),
    tabMain: document.getElementById("tabMain"),
    tabTriage: document.getElementById("tabTriage"),
    triageBadge: document.getElementById("triageBadge"),
    projectFilterBtn: document.getElementById("projectFilterBtn"),
    allProjectsBtn: document.getElementById("allProjectsBtn"),
    confirmSheet: document.getElementById("confirmSheet"),
    confirmText: document.getElementById("confirmText"),
    confirmDelete: document.getElementById("confirmDelete"),
    confirmKeep: document.getElementById("confirmKeep")
  };

  var SETTINGS_SHEETS = ["settingsHomeSheet", "editProjectsSheet", "editStatusesSheet", "settingsSheet"];
  function anySettingsSheetOpen() {
    return SETTINGS_SHEETS.some(function (k) { return !el[k].hidden; });
  }

  // ---------- Delete confirmation ----------
  // A generic staged-confirm sheet: messages is an array of one or more
  // strings shown one at a time as Delete is tapped, only running onConfirm
  // once the final stage's Delete is tapped. Task delete uses a single
  // stage (unchanged behavior); project delete uses two, since deleting a
  // project cascades to every task under it and has no undo.
  var pendingConfirmMessages = null;
  var pendingConfirmStage = 0;
  var pendingConfirmAction = null;
  var pendingConfirmCancel = null;

  var pendingConfirmRestoreSheet = null;

  // restoreSheetEl: an already-open sheet (e.g. Edit Projects) to hide while
  // the confirm sheet is showing and reveal again once it closes — same
  // stacking pattern openPicker/closePicker use for the edit sheet, needed
  // because two fixed-position .sheet elements at the same z-index would
  // otherwise leave the one underneath intercepting pointer events.
  function openConfirm(messages, onConfirm, onCancel, restoreSheetEl) {
    pendingConfirmMessages = messages;
    pendingConfirmStage = 0;
    pendingConfirmAction = onConfirm;
    pendingConfirmCancel = onCancel || null;
    pendingConfirmRestoreSheet = restoreSheetEl || null;
    if (pendingConfirmRestoreSheet) pendingConfirmRestoreSheet.hidden = true;
    el.confirmText.textContent = messages[0];
    el.backdrop.hidden = false;
    el.confirmSheet.hidden = false;
    el.confirmDelete.focus();
  }
  function closeConfirmSheet() {
    el.confirmSheet.hidden = true;
    if (pendingConfirmRestoreSheet) {
      pendingConfirmRestoreSheet.hidden = false;
    } else {
      el.backdrop.hidden = true;
    }
    pendingConfirmMessages = null;
    pendingConfirmStage = 0;
    pendingConfirmAction = null;
    pendingConfirmCancel = null;
    pendingConfirmRestoreSheet = null;
  }
  function cancelConfirmSheet() {
    var cancel = pendingConfirmCancel;
    closeConfirmSheet();
    if (cancel) cancel();
  }
  function confirmSheetPrimaryClicked() {
    if (pendingConfirmStage < pendingConfirmMessages.length - 1) {
      pendingConfirmStage++;
      el.confirmText.textContent = pendingConfirmMessages[pendingConfirmStage];
      el.confirmDelete.focus();
      return;
    }
    var action = pendingConfirmAction;
    closeConfirmSheet();
    if (action) action();
  }

  function requestDelete(taskId, onCancel) {
    openConfirm(["Delete Task?"], function () { deleteTask(taskId); render(); }, onCancel);
  }

  function requestDeleteProject(index, onCancel) {
    var p = state.projects[index];
    var count = state.tasks.filter(function (t) { return t.project === p.name; }).length;
    var countText = count === 1 ? "1 task" : count + " tasks";
    openConfirm(
      ["Delete \"" + p.name + "\" and its " + countText + "?", "Are you sure? This action cannot be undone."],
      function () { deleteProject(p.name); },
      onCancel,
      el.editProjectsSheet
    );
  }

  var GRID_STATUSES = STATUS_KEYS;

  function render() {
    renderProjectRow();
    renderStatusGrid();
    renderNavTabs();
    if (state.activeTab === "main") renderMain(); else renderTriage();
    reapplyListSelection();
  }

  function renderProjectRow() {
    el.projectFilterBtn.textContent = state.projectFilter || "Project";
    el.projectFilterBtn.classList.toggle("active", !!state.projectFilter);
    el.allProjectsBtn.classList.toggle("active", !state.projectFilter);
    var inTriage = state.activeTab === "triage";
    el.projectFilterBtn.disabled = inTriage;
    el.allProjectsBtn.disabled = inTriage;
  }

  function renderNavTabs() {
    el.tabMain.classList.toggle("active", state.activeTab === "main");
    el.tabTriage.classList.toggle("active", state.activeTab === "triage");
    var unassignedCount = state.tasks.filter(function (t) {
      return !t.project || !t.status;
    }).length;
    el.triageBadge.textContent = String(unassignedCount);
    el.triageBadge.hidden = unassignedCount === 0;
  }

  function renderStatusGrid() {
    el.statusGrid.innerHTML = "";
    GRID_STATUSES.forEach(function (s) {
      var tile = document.createElement("div");
      tile.className = "status-tile" + (state.filter.indexOf(s) !== -1 ? " selected" : "");
      statusLabel(s).split("/").forEach(function (part, i) {
        if (i > 0) tile.appendChild(document.createElement("br"));
        tile.appendChild(document.createTextNode(part));
      });
      var color = statusColor(s);
      tile.style.setProperty("--tile-color", color.bg);
      tile.style.setProperty("--tile-on", color.on);
      tile.addEventListener("click", function () {
        var idx = state.filter.indexOf(s);
        if (idx !== -1) {
          state.filter.splice(idx, 1);
        } else {
          state.filter.push(s);
        }
        saveFilter();
        state.activeTab = "main";
        render();
      });
      el.statusGrid.appendChild(tile);
    });

    var allOn = GRID_STATUSES.every(function (s) { return state.filter.indexOf(s) !== -1; });
    var allTile = document.createElement("div");
    allTile.className = "status-tile all-tile" + (allOn ? " selected" : "");
    allTile.style.setProperty("--tile-color", "var(--tile-neutral)");
    allTile.style.setProperty("--tile-on", "var(--tile-neutral-on)");
    ["All or", "Nothing"].forEach(function (part, i) {
      if (i > 0) allTile.appendChild(document.createElement("br"));
      allTile.appendChild(document.createTextNode(part));
    });
    allTile.addEventListener("click", function () {
      state.filter = allOn ? [] : GRID_STATUSES.slice();
      saveFilter();
      state.activeTab = "main";
      render();
    });
    el.statusGrid.appendChild(allTile);
  }

  function renderMain() {
    el.content.innerHTML = "";

    if (state.filter.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "No statuses selected.";
      el.content.appendChild(empty);
      return;
    }

    var projectsToShow = state.projectFilter ? [state.projectFilter] : projectNamesSorted();
    projectsToShow.forEach(function (project) {
      var projTasks = state.tasks.filter(function (t) { return t.project === project; });
      var visibleStatuses = STATUS_KEYS.filter(function (s) {
        return state.filter.indexOf(s) !== -1 && projTasks.some(function (t) { return t.status === s; });
      });
      if (visibleStatuses.length === 0) return;

      var header = document.createElement("div");
      header.className = "project-header";
      header.textContent = project;
      el.content.appendChild(header);

      visibleStatuses.forEach(function (s) {
        var tasks = projTasks.filter(function (t) { return t.status === s; });
        var label = document.createElement("div");
        label.className = "status-label";
        label.textContent = statusLabel(s);
        label.style.setProperty("--label-color", statusColor(s).bg);
        el.content.appendChild(label);
        tasks.forEach(function (t) { el.content.appendChild(renderCard(t)); });
      });
    });

    if (el.content.children.length === 0 && state.projects.length === 0) {
      var emptyProjects = document.createElement("div");
      emptyProjects.className = "empty-state";
      emptyProjects.textContent = "No projects yet — add one in Settings → Edit Projects.";
      el.content.appendChild(emptyProjects);
    }
  }

  function renderCard(task) {
    var row = document.createElement("div");
    row.className = "card-row";

    var deleteBg = document.createElement("div");
    deleteBg.className = "card-delete-bg";
    deleteBg.textContent = "Delete";
    row.appendChild(deleteBg);

    var card = document.createElement("div");
    card.className = "card";
    card.dataset.taskId = task.id;
    card.style.setProperty("--card-status", statusColor(task.status).bg);
    var title = document.createElement("span");
    title.className = "card-title";
    title.textContent = task.title;
    card.appendChild(title);
    card.addEventListener("click", function () { openEditSheet(task.id); });
    row.appendChild(card);

    var delBtn = document.createElement("button");
    delBtn.className = "delete-hover";
    delBtn.textContent = "×";
    delBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      requestDelete(task.id, null);
    });
    row.appendChild(delBtn);

    attachSwipeToDelete(row, card, function (onCancel) { requestDelete(task.id, onCancel); });
    return row;
  }

  // onSwipeDelete(onCancel) is called once the swipe crosses the delete
  // threshold; onCancel resets the card's transform if the confirm is
  // dismissed without confirming. Shared by task cards and project rows.
  function attachSwipeToDelete(row, card, onSwipeDelete) {
    var startX = null, currentX = 0, dragging = false;
    card.addEventListener("touchstart", function (e) {
      startX = e.touches[0].clientX; dragging = true;
    }, { passive: true });
    card.addEventListener("touchmove", function (e) {
      if (!dragging) return;
      currentX = e.touches[0].clientX - startX;
      if (currentX < 0) card.style.transform = "translateX(" + Math.max(currentX, -80) + "px)";
      row.classList.toggle("swiping-left", currentX < 0);
    }, { passive: true });
    card.addEventListener("touchend", function (e) {
      dragging = false;
      row.classList.remove("swiping-left");
      if (currentX < -60) {
        // Without this, iOS still synthesizes a delayed "click" from this
        // same touch after the confirm sheet's backdrop appears, landing on
        // the backdrop and auto-cancelling the confirm sheet we just opened
        // — the first Delete tap lands on a sheet already being torn down.
        e.preventDefault();
        onSwipeDelete(function () { card.style.transform = ""; });
      } else {
        card.style.transform = "";
      }
      currentX = 0;
    });
  }

  function renderTriage() {
    el.content.innerHTML = "";
    var unassigned = state.tasks.filter(function (t) {
      return !t.project || !t.status;
    });
    if (unassigned.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "Nothing to triage.";
      el.content.appendChild(empty);
      return;
    }
    unassigned.forEach(function (t) { el.content.appendChild(renderTriageCard(t)); });
  }

  function renderTriageCard(task) {
    var row = document.createElement("div");
    row.className = "card-row";

    var deleteBg = document.createElement("div");
    deleteBg.className = "card-delete-bg";
    deleteBg.textContent = "Delete";
    row.appendChild(deleteBg);

    var card = document.createElement("div");
    card.className = "triage-card";
    card.dataset.taskId = task.id;

    var title = document.createElement("div");
    title.className = "triage-title";
    title.textContent = task.title;
    card.appendChild(title);

    card.addEventListener("click", function () { openEditSheet(task.id); });
    row.appendChild(card);

    var delBtn = document.createElement("button");
    delBtn.className = "delete-hover";
    delBtn.textContent = "×";
    delBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      requestDelete(task.id, null);
    });
    row.appendChild(delBtn);

    attachSwipeToDelete(row, card, function (onCancel) { requestDelete(task.id, onCancel); });
    return row;
  }

  // ---------- Picker overlay (project/status selection) ----------
  var pickerRestoreEditSheet = false;
  var pickerReturnFocusEl = null;
  var pickerHighlightIndex = -1;

  function openPicker(title, options, currentValue, labelMap, onSelect, restoreEditSheet) {
    pickerRestoreEditSheet = !!restoreEditSheet;
    el.pickerTitle.textContent = title;
    el.pickerList.innerHTML = "";
    pickerHighlightIndex = Math.max(0, options.indexOf(currentValue));
    options.forEach(function (o, i) {
      var row = document.createElement("div");
      row.className = "picker-row"
        + (o === currentValue ? " selected" : "")
        + (i === pickerHighlightIndex ? " kb-highlight" : "");
      row.textContent = labelMap ? labelMap[o] : o;
      row.addEventListener("click", function () {
        onSelect(o);
        closePicker();
      });
      el.pickerList.appendChild(row);
    });
    el.backdrop.hidden = false;
    el.pickerSheet.hidden = false;
  }

  // Up/down move the highlighted row (no wrap, matching list-selection
  // behavior); Enter activates it the same as a click would.
  function movePickerHighlight(delta) {
    var rows = el.pickerList.children;
    if (rows.length === 0) return;
    if (pickerHighlightIndex >= 0 && rows[pickerHighlightIndex]) {
      rows[pickerHighlightIndex].classList.remove("kb-highlight");
    }
    pickerHighlightIndex = Math.max(0, Math.min(rows.length - 1, pickerHighlightIndex + delta));
    rows[pickerHighlightIndex].classList.add("kb-highlight");
    rows[pickerHighlightIndex].scrollIntoView({ block: "nearest" });
  }
  function activatePickerHighlight() {
    var rows = el.pickerList.children;
    if (rows.length === 0 || pickerHighlightIndex < 0 || !rows[pickerHighlightIndex]) return;
    rows[pickerHighlightIndex].click();
  }

  function closePicker() {
    el.pickerSheet.hidden = true;
    // onSelect (run by the caller before this) may have already closed the
    // edit sheet entirely (e.g. a Triage task just got fully assigned) —
    // only restore it if it's still the thing being edited.
    if (pickerRestoreEditSheet && state.editingTaskId) {
      el.editSheet.hidden = false;
      if (pickerReturnFocusEl) pickerReturnFocusEl.focus();
    } else {
      el.backdrop.hidden = true;
    }
    pickerRestoreEditSheet = false;
    pickerReturnFocusEl = null;
  }

  // ---------- Quick add ----------
  function openQuickAdd() {
    el.backdrop.hidden = false;
    el.quickAddSheet.hidden = false;
    el.quickAddInput.value = "";
    el.quickAddInput.focus();
  }
  function closeQuickAdd() {
    el.backdrop.hidden = true;
    el.quickAddSheet.hidden = true;
  }
  function submitQuickAdd() {
    var v = el.quickAddInput.value.trim();
    closeQuickAdd();
    if (v) {
      addTask(v);
      render();
    }
  }

  // ---------- Edit sheet ----------
  function openEditSheet(taskId) {
    var t = state.tasks.find(function (x) { return x.id === taskId; });
    if (!t) return;
    state.editingTaskId = taskId;
    el.editTitle.value = t.title;
    renderEditProjectButton(t.project);
    renderEditStatusButton(t.status);
    el.backdrop.hidden = false;
    el.editSheet.hidden = false;
  }
  function renderEditProjectButton(project) {
    el.editProject.textContent = project || "Project";
    el.editProject.classList.toggle("placeholder", !project);
  }
  function renderEditStatusButton(status) {
    el.editStatus.textContent = status ? statusLabel(status) : "Status";
    el.editStatus.classList.toggle("placeholder", !status);
    if (status) {
      var color = statusColor(status);
      el.editStatus.style.setProperty("--sel-color", color.bg);
      el.editStatus.style.setProperty("--sel-on", color.on);
    } else {
      el.editStatus.style.removeProperty("--sel-color");
      el.editStatus.style.removeProperty("--sel-on");
    }
  }
  function closeEditSheet() {
    commitTitleEdit();
    el.backdrop.hidden = true;
    el.editSheet.hidden = true;
    state.editingTaskId = null;
  }
  // Project/status picks and title edits save immediately (live, not staged) —
  // the sheet has no separate "confirm" action. Finishing a task is now a
  // direct delete (swipe or the Delete confirm sheet), not a status.
  function commitTitleEdit() {
    if (!state.editingTaskId) return;
    var t = state.tasks.find(function (x) { return x.id === state.editingTaskId; });
    if (!t) return;
    var v = el.editTitle.value.trim() || "Untitled";
    if (t.title !== v) {
      updateTask(state.editingTaskId, { title: v });
      render();
    }
  }
  function commitEditField(field, value) {
    if (!state.editingTaskId) return;
    var t = state.tasks.find(function (x) { return x.id === state.editingTaskId; });
    if (!t) return;
    var wasIncomplete = !t.project || !t.status;
    var patch = {};
    patch[field] = value;
    updateTask(state.editingTaskId, patch);
    render();
    // A task straight out of Triage closes itself once both fields are set —
    // assignment is the completion action, same as the old inline pickers.
    // A fully-assigned task being re-edited never hits this (both were
    // already set before the change), so ordinary edits stay open.
    if (wasIncomplete && t.project && t.status) {
      closeEditSheet();
    }
  }

  // ---------- Settings home / sub-sheet navigation ----------
  function showOnlySettingsSheet(target) {
    SETTINGS_SHEETS.forEach(function (k) { el[k].hidden = (el[k] !== target); });
  }
  function openSettingsHome() {
    el.backdrop.hidden = false;
    showOnlySettingsSheet(el.settingsHomeSheet);
  }
  function backToSettingsHome() {
    showOnlySettingsSheet(el.settingsHomeSheet);
  }
  function closeSettingsFlow() {
    el.backdrop.hidden = true;
    SETTINGS_SHEETS.forEach(function (k) { el[k].hidden = true; });
  }
  // No intermediate confirmation screen — closing back to Main first means
  // whatever's behind the system print dialog, before and after, is the
  // app itself, not the settings sheet.
  function triggerPrint() {
    closeSettingsFlow();
    window.print();
  }

  // ---------- Keyboard shortcuts (desktop/laptop; plain keys, no modifier) ----------
  // n=Quick-Add, t=Triage, l=full list (all statuses, all projects),
  // 1-7=toggle the matching status tile, p=Print, Escape=close open sheet.
  // Ignored while focus is in a text field, so typing task/project/status
  // titles is never intercepted; Escape is the one exception, since
  // dismissing a sheet mid-type is expected.
  function isTypingTarget(node) {
    if (!node) return false;
    var tag = node.tagName;
    return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || node.isContentEditable;
  }
  document.addEventListener("keydown", function (e) {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    // Some browser extensions (password managers, form-fillers, text
    // expanders) dispatch synthetic keydown events into the page without a
    // populated key property — e.key.length below would throw and abort the
    // whole handler for that event. Treat "no key" as "not ours to handle".
    if (!e.key) return;
    if (e.key === "Escape") {
      if (!el.backdrop.hidden) {
        el.backdrop.click();
        // A real mouse click on the backdrop blurs whatever text field was
        // focused as a side effect; el.backdrop.click() is synthetic and
        // skips that, so a field left behind focused (now hidden) would
        // silently eat every shortcut afterward via the isTypingTarget guard
        // below. But some close paths (e.g. closePicker returning to the
        // edit sheet) deliberately refocus something useful and visible —
        // only blur if what's still focused is actually inside a now-hidden
        // sheet, not just unconditionally after every close.
        var stillFocused = document.activeElement;
        if (stillFocused && stillFocused !== document.body && stillFocused.closest("[hidden]")) {
          stillFocused.blur();
        }
      } else if (listSelectedId) {
        // No sheet open — Escape deselects the arrow-key-highlighted task.
        setListSelection(null);
      }
      return;
    }
    if (isTypingTarget(document.activeElement)) return;

    // Picker overlay open (project/status option list): up/down move the
    // highlighted row, Enter picks it — same as clicking it.
    if (!el.pickerSheet.hidden) {
      if (e.key === "ArrowDown") { e.preventDefault(); movePickerHighlight(1); return; }
      if (e.key === "ArrowUp") { e.preventDefault(); movePickerHighlight(-1); return; }
      if (e.key === "Enter") { e.preventDefault(); activatePickerHighlight(); return; }
      return; // no other shortcuts while the picker is open
    }

    // Edit sheet open: left/right move focus between the Project and Status
    // buttons, Enter activates whichever one has focus (opens its picker).
    if (!el.editSheet.hidden) {
      var onSelectBtn = document.activeElement === el.editProject || document.activeElement === el.editStatus;
      if (onSelectBtn && e.key === "ArrowLeft") { e.preventDefault(); el.editProject.focus(); return; }
      if (onSelectBtn && e.key === "ArrowRight") { e.preventDefault(); el.editStatus.focus(); return; }
      if (onSelectBtn && e.key === "Enter") { e.preventDefault(); document.activeElement.click(); return; }
      return; // no other shortcuts while the edit sheet is open
    }

    // Delete-confirm sheet open: left/right move focus between Delete and
    // Keep. Enter needs no explicit handling here — both are real <button>
    // elements, so the browser's native Enter-activates-focused-button
    // behavior fires on its own as long as we don't preventDefault it.
    if (!el.confirmSheet.hidden) {
      var onConfirmBtn = document.activeElement === el.confirmDelete || document.activeElement === el.confirmKeep;
      if (onConfirmBtn && e.key === "ArrowLeft") { e.preventDefault(); el.confirmDelete.focus(); return; }
      if (onConfirmBtn && e.key === "ArrowRight") { e.preventDefault(); el.confirmKeep.focus(); return; }
      return; // no other shortcuts while the confirm sheet is open
    }

    if (!el.backdrop.hidden) return; // any other sheet is already open — don't stack another

    // List navigation (Main + Triage): up/down move the selection, Enter
    // opens the selected task — same edit sheet a tap/click opens. Delete
    // requests deletion of the selected task — same confirm sheet the
    // desktop hover-delete "×" opens, not an instant delete.
    if (e.key === "ArrowDown") { e.preventDefault(); moveListSelection(1); return; }
    if (e.key === "ArrowUp") { e.preventDefault(); moveListSelection(-1); return; }
    if (e.key === "Enter" && listSelectedId) { e.preventDefault(); openSelectedFromList(); return; }
    if (e.key === "Delete" && listSelectedId) { e.preventDefault(); requestDelete(listSelectedId, null); return; }

    var key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    // preventDefault before acting: n/l move focus into a text field as part
    // of handling the key, and without this the browser still applies that
    // same keystroke's default (typing the character) to the newly focused
    // field once the handler returns.
    if (key === "n") { e.preventDefault(); openQuickAdd(); return; }
    if (key === "t") { e.preventDefault(); el.tabTriage.click(); return; }
    if (key === "l") { e.preventDefault(); jumpToFullList(); return; }
    if (key === "p") { e.preventDefault(); triggerPrint(); return; }
    // "a" and 1-7 toggle a tile on/off; a key held even slightly longer than
    // a quick tap fires a second (repeat=true) keydown before the keyup, so
    // without this guard a marginally-held key toggles twice and silently
    // cancels itself out — reads as "worked every other time".
    if (key === "a") {
      if (e.repeat) { e.preventDefault(); return; }
      var allTile = el.statusGrid.querySelector(".all-tile");
      if (allTile) { e.preventDefault(); allTile.click(); }
      return;
    }
    if (key >= "1" && key <= "7") {
      if (e.repeat) { e.preventDefault(); return; }
      var idx = Number(key) - 1;
      if (el.statusGrid.children[idx]) { e.preventDefault(); el.statusGrid.children[idx].click(); }
    }
  });
  function jumpToFullList() {
    state.filter = GRID_STATUSES.slice();
    saveFilter();
    state.projectFilter = null;
    saveProjectFilter();
    state.activeTab = "main";
    render();
  }

  // ---------- Edit Projects ----------
  function renderEditProjectsList() {
    var list = document.getElementById("projList");
    list.innerHTML = "";
    // Display order is always alphabetical; state.projects itself keeps
    // whatever order items were added in, so mutations below address the
    // underlying array by its own index (i), not the sorted display order.
    var order = state.projects.map(function (p, i) { return i; });
    order.sort(function (a, b) {
      return state.projects[a].name.toLowerCase().localeCompare(state.projects[b].name.toLowerCase());
    });
    order.forEach(function (i) {
      var p = state.projects[i];

      var rowWrap = document.createElement("div");
      rowWrap.className = "card-row";

      var deleteBg = document.createElement("div");
      deleteBg.className = "card-delete-bg";
      deleteBg.textContent = "Delete";
      rowWrap.appendChild(deleteBg);

      var row = document.createElement("div");
      row.className = "proj-edit-row";

      var input = document.createElement("input");
      input.type = "text";
      input.className = "proj-name-input";
      input.value = p.name;
      input.addEventListener("blur", function () { renameProject(i, input.value.trim()); });
      input.addEventListener("keydown", function (e) { if (e.key === "Enter") input.blur(); });
      row.appendChild(input);

      rowWrap.appendChild(row);

      var delBtn = document.createElement("button");
      delBtn.className = "delete-hover";
      delBtn.textContent = "×";
      delBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        requestDeleteProject(i, null);
      });
      rowWrap.appendChild(delBtn);

      attachSwipeToDelete(rowWrap, row, function (onCancel) { requestDeleteProject(i, onCancel); });

      list.appendChild(rowWrap);
    });
  }

  // ---------- Edit Statuses ----------
  var openSwatchKey = null;

  function renderEditStatusesList() {
    var list = document.getElementById("statusList");
    list.innerHTML = "";
    STATUS_KEYS.forEach(function (key) {
      var meta = state.statusMeta[key];
      var color = statusColor(key);

      var row = document.createElement("div");
      row.className = "status-edit-row";

      var input = document.createElement("input");
      input.type = "text";
      input.className = "status-name-input";
      input.value = meta.label;
      input.addEventListener("blur", function () { renameStatus(key, input.value.trim()); });
      input.addEventListener("keydown", function (e) { if (e.key === "Enter") input.blur(); });
      row.appendChild(input);

      var swatchBtn = document.createElement("button");
      swatchBtn.className = "status-swatch-btn";
      swatchBtn.style.setProperty("--sw-color", color.bg);
      swatchBtn.addEventListener("click", function () {
        openSwatchKey = openSwatchKey === key ? null : key;
        renderEditStatusesList();
      });
      row.appendChild(swatchBtn);

      list.appendChild(row);

      if (openSwatchKey === key) {
        var accordion = document.createElement("div");
        accordion.className = "swatch-accordion";
        PALETTE.forEach(function (sw, i) {
          var opt = document.createElement("button");
          opt.className = "swatch-option" + (i === meta.paletteIndex ? " selected" : "");
          opt.style.setProperty("--sw-color", isDarkMode() ? sw.dark : sw.light);
          opt.addEventListener("click", function () {
            recolorStatus(key, i);
            openSwatchKey = null;
          });
          accordion.appendChild(opt);
        });
        list.appendChild(accordion);
      }
    });
  }

  // ---------- Sync Setup (relocated, functionally unchanged) ----------
  function populateSyncSetupFields() {
    var owner = document.getElementById("ghOwner");
    var repo = document.getElementById("ghRepo");
    var pat = document.getElementById("ghPat");
    var note = document.getElementById("syncNote");
    if (state.gh) {
      owner.value = state.gh.owner || "";
      repo.value = state.gh.repo || "";
      pat.value = state.gh.pat || "";
      note.textContent = "Currently syncing to " + state.gh.owner + "/" + state.gh.repo + ".";
    } else {
      owner.value = ""; repo.value = ""; pat.value = "";
      note.textContent = "Not configured — data is stored on this device only.";
    }
  }

  // ---------- Wiring ----------
  document.getElementById("fabBtn").addEventListener("click", openQuickAdd);
  document.getElementById("quickAddClose").addEventListener("click", closeQuickAdd);
  document.getElementById("quickAddSubmit").addEventListener("click", submitQuickAdd);
  el.quickAddInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") submitQuickAdd();
  });

  document.getElementById("editClose").addEventListener("click", closeEditSheet);
  el.editTitle.addEventListener("blur", commitTitleEdit);
  el.editProject.addEventListener("click", function () {
    var t = state.tasks.find(function (x) { return x.id === state.editingTaskId; });
    el.editSheet.hidden = true;
    pickerReturnFocusEl = el.editProject;
    openPicker("Project", projectNamesSorted(), t ? t.project : null, null, function (val) {
      commitEditField("project", val);
      renderEditProjectButton(val);
    }, true);
  });
  el.editStatus.addEventListener("click", function () {
    var t = state.tasks.find(function (x) { return x.id === state.editingTaskId; });
    el.editSheet.hidden = true;
    pickerReturnFocusEl = el.editStatus;
    openPicker("Status", STATUS_KEYS, t ? t.status : null, statusLabelsMap(), function (val) {
      commitEditField("status", val);
      renderEditStatusButton(val);
      // Optimize and Get-Do are Ron's personal reflection/errand buckets —
      // always his own project, so skip the manual project pick for them.
      if (val === "optimize" || val === "getdo") {
        commitEditField("project", "904 Ron");
        renderEditProjectButton("904 Ron");
      }
    }, true);
  });
  document.getElementById("pickerClose").addEventListener("click", closePicker);

  el.tabMain.addEventListener("click", function () { state.activeTab = "main"; render(); });
  el.tabTriage.addEventListener("click", function () {
    state.activeTab = "triage";
    state.projectFilter = null;
    saveProjectFilter();
    render();
  });

  el.projectFilterBtn.addEventListener("click", function () {
    openPicker("Project", projectNamesSorted(), state.projectFilter, null, function (val) {
      state.projectFilter = val;
      saveProjectFilter();
      state.activeTab = "main";
      render();
    }, false);
  });
  el.allProjectsBtn.addEventListener("click", function () {
    state.projectFilter = null;
    saveProjectFilter();
    state.activeTab = "main";
    render();
  });

  document.getElementById("settingsBtn").addEventListener("click", openSettingsHome);
  document.getElementById("settingsHomeClose").addEventListener("click", closeSettingsFlow);
  Array.prototype.forEach.call(document.querySelectorAll(".settings-row"), function (row) {
    row.addEventListener("click", function () {
      var target = row.getAttribute("data-target");
      if (target === "print") {
        triggerPrint();
      } else if (target === "editProjects") {
        renderEditProjectsList();
        showOnlySettingsSheet(el.editProjectsSheet);
      } else if (target === "editStatuses") {
        openSwatchKey = null;
        renderEditStatusesList();
        showOnlySettingsSheet(el.editStatusesSheet);
      } else if (target === "syncSetup") {
        populateSyncSetupFields();
        showOnlySettingsSheet(el.settingsSheet);
      }
    });
  });
  document.getElementById("editProjectsBack").addEventListener("click", backToSettingsHome);
  document.getElementById("addProjectBtn").addEventListener("click", addProjectFromInput);
  document.getElementById("addProjectInput").addEventListener("keydown", function (e) {
    if (e.key === "Enter") addProjectFromInput();
  });
  document.getElementById("editStatusesBack").addEventListener("click", backToSettingsHome);
  document.getElementById("settingsClose").addEventListener("click", backToSettingsHome);
  document.getElementById("settingsSkip").addEventListener("click", closeSettingsFlow);
  document.getElementById("settingsSave").addEventListener("click", function () {
    var owner = document.getElementById("ghOwner").value.trim();
    var repo = document.getElementById("ghRepo").value.trim();
    var pat = document.getElementById("ghPat").value.trim();
    if (owner && repo && pat) {
      state.gh = { owner: owner, repo: repo, pat: pat, sha: null };
      localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(state.gh));
      ghPull();
    }
    closeSettingsFlow();
  });

  document.getElementById("confirmDelete").addEventListener("click", confirmSheetPrimaryClicked);
  document.getElementById("confirmKeep").addEventListener("click", cancelConfirmSheet);
  document.getElementById("confirmClose").addEventListener("click", cancelConfirmSheet);

  el.backdrop.addEventListener("click", function () {
    if (!el.pickerSheet.hidden) { closePicker(); return; }
    if (!el.confirmSheet.hidden) { cancelConfirmSheet(); return; }
    if (anySettingsSheetOpen()) { closeSettingsFlow(); return; }
    closeQuickAdd();
    closeEditSheet();
  });

  // ---------- Orientation lock ----------
  // window.orientation only exists on iOS/mobile Safari, so this is a no-op
  // on desktop. iOS provides no real lock API for home-screen web apps, so
  // this counter-rotates the page on physical landscape flips instead.
  function applyOrientationLock() {
    if (typeof window.orientation === "undefined") return;
    var root = document.documentElement;
    var w = window.innerWidth, h = window.innerHeight;
    if (w <= h) {
      root.classList.remove("force-portrait");
      root.style.width = ""; root.style.height = ""; root.style.transform = "";
      return;
    }
    root.classList.add("force-portrait");
    root.style.width = h + "px";
    root.style.height = w + "px";
    root.style.transform = window.orientation === 90 ?
      "translateY(" + h + "px) rotate(-90deg)" :
      "translateX(" + w + "px) rotate(90deg)";
  }
  window.addEventListener("resize", applyOrientationLock);
  window.addEventListener("orientationchange", applyOrientationLock);

  // ---------- Init ----------
  loadLocal();
  render();
  applyOrientationLock();
  if (state.gh) ghPull();
  if (window.matchMedia) {
    // Status colors are computed in JS (not pure CSS media-query swapping)
    // so a live OS theme change needs an explicit re-render to pick up the
    // correct light/dark variant from the palette.
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", render);
  }
})();
</script>
</body>
</html>
